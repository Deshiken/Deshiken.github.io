<div class="d-flex flex-wrap" style="width: 1100px;">
  <ng-container *ngFor="let ability of cardPrintService.neutralAbilitiesToPrint | keyvalue; let i = index">
    <div class="neutral-ability-wrapper" [class.page-break-after]="(i + 1) % 12 === 0">
      <app-printable-neutral-ability [neutralAbility]="ability.value"></app-printable-neutral-ability>
    </div>
  </ng-container>
</div>
