<div class="spell-card p-2 m-1">
  <div class="card-body">
    
    <div class="d-flex justify-content-between">
      <div class="fs-4">
        @if (neutralAbility.cost.technology && neutralAbility.cost.technology > 3) {
          <span><i class="bi bi-gear ms-1">(x{{neutralAbility.cost.technology}})</i></span>
        }
        @else {
          @for (item of [].constructor(neutralAbility.cost.technology); track item) {
            <i class="bi bi-gear ms-1"></i>
          }
        }
      </div>
      <p class="card-title fs-5 fw-bold text-center segoe mb-1">{{neutralAbility.name}}</p>
    </div>

    <div class="card-text segoe fs-10 small-text"
      #cardText
      [innerHTML]="neutralAbility.description">
    </div>

  </div>
</div>
